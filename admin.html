<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị - STYLESHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light admin-body">

    <nav class="navbar navbar-dark admin-header-bar py-3 shadow-sm">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold tracking-wide fs-5" href="#">
                <i class="bi bi-speedometer2 me-2 text-info"></i>ADMIN DASHBOARD
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm fw-medium px-4 py-2" style="border-radius: 30px;">
                <i class="bi bi-shop"></i> Quay lại cửa hàng
            </a>
        </div>
    </nav>

    <div class="container my-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0 text-dark" style="font-size: 2rem; color: #1e293b;">Quản Lý Sản Phẩm</h2>
            <div>
                <button class="btn btn-danger fw-medium px-4 py-2 shadow-sm me-2 text-white" id="btnBulkDelete" onclick="deleteSelectedProducts()" style="display: none; border-radius: 30px;">
                    <i class="bi bi-trash3 me-1"></i> Xóa Đã Chọn (<span id="selectedCount">0</span>)
                </button>
                <button class="btn btn-primary fw-medium px-4 py-2 shadow-sm btn-add-new text-white" onclick="openProductModal()">
                    <i class="bi bi-plus-circle me-1"></i> Thêm Sản Phẩm
                </button>
            </div>
        </div>

        <div class="input-group mb-4 search-box bg-white w-50">
            <span class="input-group-text bg-transparent border-0 text-primary ps-4"><i class="bi bi-search"></i></span>
            <input type="text" id="adminSearchInput" class="form-control border-0 py-2 ps-2" placeholder="Tìm kiếm sản phẩm theo tên hoặc ID...">
        </div>

        <div class="admin-card overflow-hidden">
            <div class="card-body p-0">
                <table class="table table-borderless mb-0 align-middle admin-table">
                    <thead>
                        <tr>
                            <th class="text-center" style="width: 10%;">ID</th>
                            <th class="text-center" style="width: 15%;">Hình Ảnh</th>
                            <th class="text-start" style="width: 30%;">Tên Sản Phẩm</th>
                            <th class="text-center" style="width: 20%;">Giá (VNĐ)</th>
                            <th class="text-center" style="width: 25%;">
                                Thao Tác
                                <input class="form-check-input ms-2" type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)" style="cursor: pointer;">
                            </th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <tr><td colspan="5" class="py-5 text-center text-muted">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Đang tải dữ liệu...</p>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
                <div class="modal-header bg-light border-bottom-0" style="border-radius: 16px 16px 0 0;">
                    <h5 class="modal-title fw-bold text-primary" id="modalTitle">Thêm Sản Phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="prodId">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Tên sản phẩm</label>
                        <input type="text" class="form-control bg-light border-0 py-2" id="prodName" placeholder="VD: Áo Sơ Mi Nữ">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Giá (VNĐ)</label>
                        <input type="number" class="form-control bg-light border-0 py-2" id="prodPrice" placeholder="VD: 250000">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Link Hình Ảnh</label>
                        <input type="text" class="form-control bg-light border-0 py-2" id="prodImage" placeholder="https://...">
                    </div>
                </div>
                <div class="modal-footer border-top-0 px-4 pb-4">
                    <button type="button" class="btn btn-light fw-medium px-4" data-bs-dismiss="modal" style="border-radius: 30px;">Hủy</button>
                    <button type="button" class="btn btn-primary fw-medium px-4 text-white btn-add-new" id="saveBtn" onclick="saveProduct()">Lưu Thay Đổi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
